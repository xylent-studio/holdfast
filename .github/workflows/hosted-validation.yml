name: Hosted Validation

on:
  workflow_dispatch:
  schedule:
    - cron: '23 11 * * *'

jobs:
  hosted-smoke:
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.PLAYWRIGHT_STAGING_SUPABASE_URL != '' && secrets.PLAYWRIGHT_STAGING_SUPABASE_ANON_KEY != '' && secrets.PLAYWRIGHT_PROD_SUPABASE_URL != '' && secrets.PLAYWRIGHT_PROD_SUPABASE_ANON_KEY != '' }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      VITE_SUPABASE_URL: ${{ secrets.PLAYWRIGHT_PROD_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.PLAYWRIGHT_PROD_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Write staging hosted env
        shell: bash
        run: |
          cat > .env.staging.ci <<'EOF'
          VITE_SUPABASE_URL=${{ secrets.PLAYWRIGHT_STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.PLAYWRIGHT_STAGING_SUPABASE_ANON_KEY }}
          EOF
      - name: Staging hosted auth smoke
        run: npm run cf:pages:staging:auth-smoke -- --env-file .env.staging.ci
      - name: Staging hosted sync smoke
        run: npm run cf:pages:staging:sync-smoke -- --env-file .env.staging.ci
      - name: Production hosted auth smoke
        run: npm run cf:pages:prod:auth-smoke
      - name: Production hosted sync smoke
        run: npm run cf:pages:prod:sync-smoke

  hosted-smoke-not-configured:
    if: ${{ !(secrets.CLOUDFLARE_API_TOKEN != '' && secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.PLAYWRIGHT_STAGING_SUPABASE_URL != '' && secrets.PLAYWRIGHT_STAGING_SUPABASE_ANON_KEY != '' && secrets.PLAYWRIGHT_PROD_SUPABASE_URL != '' && secrets.PLAYWRIGHT_PROD_SUPABASE_ANON_KEY != '') }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Hosted validation secrets are not fully configured."
          echo "Add CLOUDFLARE_API_TOKEN, SUPABASE_ACCESS_TOKEN,"
          echo "PLAYWRIGHT_STAGING_SUPABASE_URL, PLAYWRIGHT_STAGING_SUPABASE_ANON_KEY,"
          echo "PLAYWRIGHT_PROD_SUPABASE_URL, and PLAYWRIGHT_PROD_SUPABASE_ANON_KEY."
