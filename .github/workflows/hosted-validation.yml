name: Hosted Smoke

on:
  workflow_dispatch:

jobs:
  hosted-smoke:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PLAYWRIGHT_STAGING_SUPABASE_URL: ${{ secrets.PLAYWRIGHT_STAGING_SUPABASE_URL }}
      PLAYWRIGHT_STAGING_SUPABASE_ANON_KEY: ${{ secrets.PLAYWRIGHT_STAGING_SUPABASE_ANON_KEY }}
      PLAYWRIGHT_PROD_SUPABASE_URL: ${{ secrets.PLAYWRIGHT_PROD_SUPABASE_URL }}
      PLAYWRIGHT_PROD_SUPABASE_ANON_KEY: ${{ secrets.PLAYWRIGHT_PROD_SUPABASE_ANON_KEY }}
    steps:
      - name: Check hosted validation secrets
        shell: bash
        run: |
          missing=()
          for key in \
            CLOUDFLARE_API_TOKEN \
            SUPABASE_ACCESS_TOKEN \
            PLAYWRIGHT_STAGING_SUPABASE_URL \
            PLAYWRIGHT_STAGING_SUPABASE_ANON_KEY \
            PLAYWRIGHT_PROD_SUPABASE_URL \
            PLAYWRIGHT_PROD_SUPABASE_ANON_KEY
          do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Hosted validation secrets are not fully configured."
            printf 'Missing: %s\n' "${missing[*]}"
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Write staging hosted env
        shell: bash
        run: |
          cat > .env.staging.ci <<EOF
          VITE_SUPABASE_URL=${PLAYWRIGHT_STAGING_SUPABASE_URL}
          VITE_SUPABASE_ANON_KEY=${PLAYWRIGHT_STAGING_SUPABASE_ANON_KEY}
          EOF
      - name: Write production hosted env
        shell: bash
        run: |
          cat > .env.production.ci <<EOF
          VITE_SUPABASE_URL=${PLAYWRIGHT_PROD_SUPABASE_URL}
          VITE_SUPABASE_ANON_KEY=${PLAYWRIGHT_PROD_SUPABASE_ANON_KEY}
          EOF
      - name: Staging hosted shell smoke
        run: npm run cf:pages:staging:smoke -- --env-file .env.staging.ci
      - name: Staging hosted auth smoke
        run: npm run cf:pages:staging:auth-smoke -- --env-file .env.staging.ci
      - name: Staging hosted sync smoke
        run: npm run cf:pages:staging:sync-smoke -- --env-file .env.staging.ci
      - name: Production hosted shell smoke
        run: npm run cf:pages:prod:smoke -- --env-file .env.production.ci
      - name: Production hosted auth smoke
        run: npm run cf:pages:prod:auth-smoke -- --env-file .env.production.ci
      - name: Production hosted sync smoke
        run: npm run cf:pages:prod:sync-smoke -- --env-file .env.production.ci
