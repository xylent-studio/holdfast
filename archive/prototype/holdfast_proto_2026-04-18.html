<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Holdfast</title>
<style>
:root{
  --bg:#08100e;
  --bg2:#0c1513;
  --panel:#12201b;
  --panel2:#172822;
  --soft:rgba(255,255,255,.06);
  --soft2:rgba(255,255,255,.1);
  --line:rgba(255,255,255,.12);
  --line2:rgba(255,255,255,.18);
  --text:#f6fcf8;
  --muted:rgba(246,252,248,.9);
  --dim:rgba(246,252,248,.78);
  --faint:rgba(246,252,248,.58);
  --accent:#55d49a;
  --accentSoft:rgba(85,212,154,.16);
  --warn:#e9d188;
  --warnSoft:rgba(233,209,136,.16);
  --danger:#ff8e84;
  --dangerSoft:rgba(255,142,132,.15);
  --shadow:0 24px 52px rgba(0,0,0,.28);
  --navH:74px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);color:var(--text)}
body{min-height:100vh;background:
  radial-gradient(circle at top, rgba(85,212,154,.18), transparent 28%),
  radial-gradient(circle at bottom right, rgba(85,212,154,.08), transparent 24%),
  linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
.wrap{max-width:920px;margin:0 auto;padding:12px 12px calc(var(--navH) + 22px)}
.topbar,.card,.sheet{backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.topbar,.card{border:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));box-shadow:var(--shadow)}
.topbar{position:sticky;top:8px;z-index:20;border-radius:22px;padding:10px 12px;margin-bottom:14px;background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.045));}
.card{border-radius:26px;padding:16px}
.stack{display:grid;gap:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.datebar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.datepick{display:flex;gap:8px;align-items:center;min-width:0}
.datepick .field{min-width:0}
.native-date-proxy,.native-time-proxy{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;padding:0;margin:0;border:0}
.space{justify-content:space-between}
.tiny{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:rgba(246,252,248,.82)}
.h1{font-size:clamp(28px,5vw,40px);line-height:1.03;letter-spacing:-.045em;margin:4px 0 0}
.h2{font-size:22px;line-height:1.05;letter-spacing:-.03em;margin:0}
.sub{font-size:14px;line-height:1.55;color:rgba(246,252,248,.88)}
.subtle{font-size:13px;line-height:1.45;color:rgba(246,252,248,.72)}
.actions.primary{display:flex;gap:8px;flex-wrap:wrap}
.actions.secondary{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(246,252,248,.8);margin-bottom:8px}
.btn{min-height:44px;padding:10px 14px;border:1px solid var(--line2);border-radius:16px;background:var(--soft);color:var(--text);display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.18s ease;text-decoration:none}
.btn:hover{background:var(--soft2)}
.btn.primary{background:var(--accentSoft);border-color:rgba(85,212,154,.34)}
.btn.warn{background:var(--warnSoft);border-color:rgba(233,209,136,.3)}
.btn.danger{background:var(--dangerSoft);border-color:rgba(255,142,132,.32)}
.btn[disabled]{opacity:.58;cursor:default;pointer-events:none}
.btn.slim{min-height:34px;padding:7px 10px;border-radius:13px;font-size:13px}
.btn.full{width:100%}
.field, textarea, input[type="date"], input[type="time"], input[type="text"], select{width:100%;padding:12px 14px;border-radius:16px;border:1px solid var(--line2);background:rgba(3,8,7,.46);color:var(--text);outline:none}
.timepick{display:flex;gap:8px;align-items:center;min-width:0}
.timepick .field{min-width:0}
textarea{min-height:92px;resize:vertical;line-height:1.6}
input::placeholder,textarea::placeholder{color:rgba(246,252,248,.3)}
.field:focus, textarea:focus, input:focus, select:focus{border-color:rgba(85,212,154,.45);box-shadow:0 0 0 3px rgba(85,212,154,.12)}
.nav{position:fixed;left:50%;transform:translateX(-50%);width:min(760px, calc(100% - 24px));bottom:12px;z-index:40;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:8px;border:1px solid var(--line2);border-radius:24px;background:rgba(8,13,12,.84);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:var(--shadow)}
.nav button{min-height:54px;border-radius:18px;border:1px solid transparent;background:transparent;color:var(--dim);display:grid;gap:2px;place-items:center}
.nav button.active{color:var(--text);background:var(--accentSoft);border-color:rgba(85,212,154,.28)}
.icon{font-size:18px;line-height:1}
.navlabel{font-size:11px}
.stat{padding:14px;border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.05)}
.stat .value{font-size:28px;letter-spacing:-.03em;margin-top:6px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:var(--soft);font-size:13px;color:var(--muted)}
.chip.active{background:var(--accentSoft);color:var(--text);border-color:rgba(85,212,154,.28)}
.item{display:grid;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:18px;background:rgba(0,0,0,.14);transition:.18s ease}
.item.kind-note{background:rgba(255,255,255,.05);border-color:rgba(138,196,255,.18)}
.item.kind-note .itemtop{gap:12px}
.item.state-waiting{border-color:rgba(233,209,136,.22)}
.item.state-done{opacity:.86}
.item.state-archived{opacity:.72}
.item.focused{border-color:rgba(85,212,154,.28);box-shadow:0 0 0 2px rgba(85,212,154,.06) inset}
.itemtop{display:flex;gap:10px;align-items:flex-start}
.itembody{width:100%}
.itemtext{width:100%;background:transparent;border:none;color:var(--text);outline:none;padding:0;font-size:15px;line-height:1.45}
.itemtext.done{text-decoration:line-through;color:var(--dim)}
.item.kind-note .itemtext{font-weight:600}
.meta{font-size:12px;color:var(--dim);display:flex;gap:8px;flex-wrap:wrap}
.meta.note{margin-top:8px}
.note-eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(138,196,255,.85);margin-bottom:4px}
.note-preview{margin-top:6px;font-size:14px;line-height:1.5;color:rgba(246,252,248,.84)}
.task-preview{margin-top:4px;font-size:13px;line-height:1.45;color:rgba(246,252,248,.68)}
.note-attachments{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
.note-thumb{width:64px;height:64px;border-radius:12px;border:1px solid var(--line);object-fit:cover}
.note-chip{padding:6px 10px;border-radius:999px;border:1px solid rgba(138,196,255,.18);background:rgba(138,196,255,.08);color:rgba(246,252,248,.82);font-size:12px}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.badge{padding:6px 9px;border-radius:999px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--line);color:var(--dim)}
.badge.today{background:var(--accentSoft);color:var(--text);border-color:rgba(85,212,154,.28)}
.badge.waiting{background:var(--warnSoft);color:var(--text);border-color:rgba(233,209,136,.28)}
.badge.later{background:rgba(255,255,255,.07)}
.badge.done{background:rgba(255,255,255,.08)}
.badge.focus{background:rgba(85,212,154,.22);color:var(--text);border-color:rgba(85,212,154,.32)}
.toggle{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 15px;border:1px solid rgba(255,255,255,.2);border-radius:18px;background:rgba(255,255,255,.085);color:var(--text);font-size:15px;font-weight:600;transition:.18s ease}
.toggle:hover{background:rgba(255,255,255,.11);border-color:rgba(255,255,255,.32)}
.toggle.on{background:rgba(85,212,154,.18);border-color:rgba(85,212,154,.42);box-shadow:0 0 0 3px rgba(85,212,154,.08) inset}
.toggle span:first-child{color:rgba(246,252,248,1);text-shadow:0 1px 0 rgba(0,0,0,.18)}
.check{width:22px;height:22px;border-radius:999px;border:1px solid rgba(255,255,255,.22);display:grid;place-items:center;flex:0 0 auto;background:rgba(255,255,255,.04);color:rgba(246,252,248,.86);font-size:13px;line-height:1}
.check.on{background:var(--accentSoft);border-color:rgba(85,212,154,.38);color:var(--text);box-shadow:0 0 0 3px rgba(85,212,154,.08)}
.check.note{background:rgba(138,196,255,.08);border-color:rgba(138,196,255,.18);color:rgba(138,196,255,.9)}
.sep{height:1px;background:var(--line);margin:2px 0}
.empty{padding:18px;border:1px dashed var(--line2);border-radius:20px;color:var(--dim);text-align:center}
.list{display:grid;gap:10px}
.kbd{padding:2px 7px;border-radius:8px;border:1px solid var(--line);font-size:12px;color:var(--dim)}
.sheetback{position:fixed;inset:0;background:rgba(0,0,0,.48);opacity:0;pointer-events:none;transition:.18s ease;z-index:60}
.sheetback.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:12px;right:12px;bottom:12px;z-index:61;border:1px solid var(--line2);border-radius:28px;background:linear-gradient(180deg, rgba(24,36,32,.98), rgba(13,20,18,.98));box-shadow:var(--shadow);transform:translateY(14px);opacity:0;pointer-events:none;transition:.18s ease;max-height:80vh;overflow:auto}
.sheet.open{transform:none;opacity:1;pointer-events:auto}
.sheetin{padding:18px}
.fab{position:fixed;right:18px;bottom:calc(var(--navH) + 22px);z-index:45;width:58px;height:58px;border-radius:999px;border:1px solid rgba(85,212,154,.3);background:linear-gradient(180deg, rgba(85,212,154,.26), rgba(85,212,154,.18));color:var(--text);box-shadow:var(--shadow);font-size:28px}
.footerhelp{font-size:13px;color:var(--dim)}
.toast{position:fixed;left:50%;transform:translateX(-50%) translateY(14px);bottom:calc(var(--navH) + 16px);z-index:72;min-width:min(520px,calc(100% - 24px));max-width:calc(100% - 24px);display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-radius:16px;border:1px solid var(--line2);background:rgba(8,13,12,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.18s ease}
.toast.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.toast .msg{font-size:14px;color:var(--muted)}
.toast .btn{min-height:36px;padding:8px 12px;border-radius:12px}
@media (max-width:760px){
  .grid2,.grid3{grid-template-columns:1fr}
  .wrap{padding-inline:10px}
  .topbar{border-radius:20px}
  .card{border-radius:24px;padding:15px}
  .nav{left:8px;right:auto;transform:none;width:calc(100% - 16px);bottom:8px;gap:8px;padding:7px}
  .fab{right:14px;bottom:calc(var(--navH) + 18px)}
}
.sheet-grid{display:grid;gap:12px}.seg{display:flex;gap:8px;flex-wrap:wrap}.seg .chip,.seg .btn{min-height:40px}.helper{font-size:13px;line-height:1.5;color:rgba(246,252,248,.72)}@media (min-width:761px){.sheet-grid.two{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar" id="topbar"></div>
  <main id="app"></main>
</div>
<div class="sheetback" id="sheetBack"></div>
<div class="sheet" id="sheet"><div class="sheetin" id="sheetIn"></div></div>
<button class="fab" id="fab" aria-label="Quick add" style="display:none">＋</button>
<div class="toast" id="toast"></div>
<nav class="nav" id="nav"></nav>
<script>
(()=>{
  const STORAGE_KEY = 'justin-os-standalone-v1';
  const VERSION = 5;
  const NAV = [
    {id:'now', label:'Now', icon:'⌂'},
    {id:'inbox', label:'Inbox', icon:'＋'},
    {id:'later', label:'Upcoming', icon:'◷'},
    {id:'review', label:'Review', icon:'◔'}
  ];
  const LANES = [
    {key:'work', label:'Store / Work'},
    {key:'health', label:'Body'},
    {key:'home', label:'Home / Errands'},
    {key:'people', label:'Relationships'},
    {key:'build', label:'Build / Future'},
    {key:'admin', label:'Money / Admin'}
  ];
  const CARE = [
    ['water','Water'],['food','Food'],['vitamins','Supplements'],['hygiene','Hygiene'],['movement','Movement'],['sleep','Sleep setup']
  ];
  const STATUS_LABEL = { inbox:'Inbox', today:'Today', later:'Queued', waiting:'Waiting on', done:'Done', archived:'Archived' };
  const WORK_DAYS = [0,1,4,5,6];
  const LONG_DAYS = [0,1];
  const TUESDAY = [2];
  const WEDNESDAY = [3];
  const PERSONAL_FOCUS = 'Become a man I respect in the mirror. Handle reality early. Keep my body, money, and time under command.';
  const PERSONAL_STANDARDS = 'Carry less in my head. Tell the truth sooner. Keep body, time, and money under command.';
  const PERSONAL_WHY = 'Holdfast is my operating system. It keeps me from drifting, keeps me honest, and helps me build a life I can respect and enjoy.';
  const OLD_GENERIC_FOCUS = 'Protect the basics. Run the day with intention. Build the next version of my life.';
  const OLD_GENERIC_STANDARDS = 'Water. Food. Hygiene. Movement. One real priority. Carry less in my head. Finish what matters.';
  const OLD_GENERIC_WHY = 'This is my operating system. It keeps me steadier, more honest, and moving toward the man I am choosing to become.';
  const DEFAULT_ROUTINES = [];
  const LEGACY_PRESET_ROUTINE_IDS = new Set(['r-water','r-shower','r-food','r-vitamins','r-pack-work','r-long-food','r-leave-work','r-friday-money','r-tuesday-reset','r-tuesday-home','r-wednesday-body','r-wednesday-build','r-close']);

  const $app = document.getElementById('app');
  const $nav = document.getElementById('nav');
  const $topbar = document.getElementById('topbar');
  const $fab = document.getElementById('fab');
  const $sheet = document.getElementById('sheet');
  const $sheetBack = document.getElementById('sheetBack');
  const $sheetIn = document.getElementById('sheetIn');
  const $toast = document.getElementById('toast');
  let sheetBeforeClose = null;
  let sheetCleanup = null;

  const uid = () => crypto?.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
  const now = () => Date.now();
  const formatLocalIso = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const todayIso = () => formatLocalIso(new Date());
  const toDate = iso => new Date(iso + 'T00:00:00');
  const iso = date => formatLocalIso(date);
  const addDays = (isoStr, n) => { const d = toDate(isoStr); d.setDate(d.getDate()+n); return iso(d); };
  const niceDate = isoStr => toDate(isoStr).toLocaleDateString(undefined,{ weekday:'short', month:'short', day:'numeric' });
  const niceStamp = ms => new Date(ms).toLocaleString(undefined,{ month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
  const weekdayIndex = isoStr => toDate(isoStr).getDay();
  const startOfWeek = isoStr => { const d = toDate(isoStr); const day = d.getDay(); const diff = day === 0 ? -6 : 1 - day; d.setDate(d.getDate()+diff); return iso(d); };
  const endOfWeek = isoStr => addDays(startOfWeek(isoStr), 6);
  const monthKey = isoStr => isoStr.slice(0,7);
  const inWindow = (target, base, span) => {
    if(!target) return false;
    if(span === 'day') return target === base;
    if(span === 'week') return target >= startOfWeek(base) && target <= endOfWeek(base);
    if(span === 'month') return monthKey(target) === monthKey(base);
    return false;
  };

  function mergePersonalRoutines(existing=[]) {
    return (existing || []).map(r => ({
      id:r.id || uid(),
      text:r.text || '',
      lane:r.lane || 'admin',
      seed:r.seed || 'today',
      days:Array.isArray(r.days) ? r.days : [0,1,2,3,4,5,6],
      active:r.active !== false,
      time:r.time || '',
      notes:r.notes || ''
    }));
  }
  function applyJustinProfile(settings) {
    settings = settings || defaultSettings();
    if(!settings.focus || settings.focus === OLD_GENERIC_FOCUS) settings.focus = PERSONAL_FOCUS;
    if(!settings.standards || settings.standards === OLD_GENERIC_STANDARDS) settings.standards = PERSONAL_STANDARDS;
    if(!settings.why || settings.why === OLD_GENERIC_WHY) settings.why = PERSONAL_WHY;
    settings.profileVersion = 2;
    settings.routines = mergePersonalRoutines(settings.routines || []);
    return settings;
  }
  function routinesForDate(date=state?.currentDate || todayIso()) {
    const wd = weekdayIndex(date);
    return (state.settings?.routines || [])
      .filter(r => r.active && Array.isArray(r.days) && r.days.includes(wd))
      .sort((a,b) => (a.time || '99:99').localeCompare(b.time || '99:99') || String(a.text || '').localeCompare(String(b.text || '')));
  }

  function dayBlueprint(date=state?.currentDate || todayIso()) {
    const wd = weekdayIndex(date);
    const friday = wd === 5;
    if(wd === 2) return {
      title:'Reset / admin day',
      sub:'This day is for life maintenance, not drift.',
      bullets:['Money + admin block','Home reset + supplies','Close loose ends early'],
      wake:'Wake 7:00',
      rule:'Do not let the off day disappear.'
    };
    if(wd === 3) return {
      title:'Body / build day',
      sub:'Rebuild the platform and move the future forward.',
      bullets:['Movement block','Errands / shoes / supplies','One real build move'],
      wake:'Wake 7:00',
      rule:'Use the day, do not just consume it.'
    };
    if(wd === 0 || wd === 1) return {
      title:'Long shift',
      sub:'Fuel up, bring food, and stay ahead of the day.',
      bullets:['Wake 6:15','Leave by 7:50','Bring food + water'],
      wake:'Wake 6:15',
      rule:'Do not enter a 13.5-hour day underfed.'
    };
    const base = {
      title:'Standard workday',
      sub:'Start with margin and run the shift cleanly.',
      bullets:['Wake 6:15','Leave by 7:50','Food + water ready'],
      wake:'Wake 6:15',
      rule:'Do not start the day already behind.'
    };
    if(friday) base.bullets = ['Wake 6:15','Leave by 7:50','Friday money check after work'];
    return base;
  }

  function dropLegacyPresetRoutinesFromState(target){
    if(!target) return;
    if(target.settings && Array.isArray(target.settings.routines)){
      target.settings.routines = target.settings.routines.filter(r => !LEGACY_PRESET_ROUTINE_IDS.has(r.id));
    }
    if(Array.isArray(target.items)){
      target.items = target.items.filter(item => !LEGACY_PRESET_ROUTINE_IDS.has(item.routineId));
    }
    Object.values(target.days || {}).forEach(day => {
      if(Array.isArray(day.seededRoutineIds)) day.seededRoutineIds = day.seededRoutineIds.filter(id => !LEGACY_PRESET_ROUTINE_IDS.has(id));
    });
  }
  const missedDays = (from, to) => Math.max(0, Math.round((toDate(to)-toDate(from))/86400000)-1);
  const h = s => String(s ?? '').replace(/[&<>\"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

  const localIso = d => formatLocalIso(d);
  function parseUserDate(value){
    const raw = String(value || '').trim();
    if(!raw) return '';
    if(/^\d{4}-\d{2}-\d{2}$/.test(raw)){
      const d = toDate(raw);
      return Number.isNaN(d.getTime()) ? '' : (iso(d) === raw ? raw : '');
    }
    const mdY = raw.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})$/);
    if(mdY){
      let mm = Number(mdY[1]), dd = Number(mdY[2]), yy = Number(mdY[3]);
      if(yy < 100) yy += 2000;
      const d = new Date(yy, mm - 1, dd);
      return d.getFullYear() === yy && d.getMonth() === mm - 1 && d.getDate() === dd ? localIso(d) : '';
    }
    const parsed = new Date(raw);
    return Number.isNaN(parsed.getTime()) ? '' : localIso(parsed);
  }
  function bindDateControl({ textId, nativeId, buttonId, onCommit }){
    const text = document.getElementById(textId);
    const native = document.getElementById(nativeId);
    const button = document.getElementById(buttonId);
    if(!text || !native || !button) return;
    const commit = (raw, opts={}) => {
      const parsed = parseUserDate(raw);
      if(parsed){
        text.value = parsed;
        native.value = parsed;
        if(onCommit) onCommit(parsed);
        return true;
      }
      if(opts.revert){
        const fallback = native.value || opts.fallback || '';
        text.value = fallback;
        if(fallback) native.value = fallback;
      }
      return false;
    };
    button.onclick = () => {
      if(typeof native.showPicker === 'function') native.showPicker();
      else { native.focus(); native.click(); }
    };
    native.onchange = e => commit(e.target.value, { revert:true });
    text.addEventListener('keydown', e => {
      if(e.key === 'Enter'){
        e.preventDefault();
        commit(text.value, { revert:true, fallback:native.value });
      }
    });
    text.addEventListener('blur', () => {
      if(text.value.trim()) commit(text.value, { revert:true, fallback:native.value });
      else text.value = native.value || '';
    });
  }
  function getDateControlValue(textId, nativeId, fallback=''){
    const text = document.getElementById(textId);
    const native = document.getElementById(nativeId);
    const parsed = parseUserDate(text?.value || native?.value || '');
    const value = parsed || fallback;
    if(text) text.value = value;
    if(native) native.value = value;
    return value;
  }

  function parseUserTime(raw){
    const s = String(raw || '').trim().toLowerCase();
    if(!s) return '';

    const setIdle = (msg='') => {

    const setLive = () => {

        save(); render();

function itemMeta(item){
  const lane = LANES.find(l => l.key === item.lane)?.label || 'Admin';
  const statusLabel = item.status === 'later'
    ? (item.targetDate ? 'Planned' : 'Queued')
    : (STATUS_LABEL[item.status] || item.status);
  const parts = [lane, statusLabel, niceDate(item.sourceDate || state.currentDate)];
  if(item.targetDate){
    if(item.status === 'later' && item.targetDate < state.currentDate) parts.push('overdue');
    else if(item.status === 'later' && item.targetDate === state.currentDate) parts.push('due today');
    else parts.push('on ' + niceDate(item.targetDate));
  }
  if(item.targetTime) parts.push(niceTime(item.targetTime));
  if(item.notes) parts.push(item.kind === 'note' ? 'details' : 'instructions');
  const attachments = Array.isArray(item.attachments) ? item.attachments : [];
  const imageCount = attachments.filter(attachmentIsImage).length;
  const fileCount = attachments.length - imageCount;
  if(imageCount) parts.push(imageCount === 1 ? '1 photo' : `${imageCount} photos`);
  if(fileCount) parts.push(fileCount === 1 ? '1 file' : `${fileCount} files`);
  return parts;
}

  const detailPreview = previewText(item.notes, item.kind === 'note' ? 220 : 120);
  const attachments = Array.isArray(item.attachments) ? item.attachments : [];
  const imageAttachments = attachments.filter(attachmentIsImage);
  const otherAttachments = attachments.filter(att => !attachmentIsImage(att));
  const check = item.kind === 'task'
    ? (isArchived
        ? `<div class="check">·</div>`
        : `<button class="check ${isDone?'on':''}" data-act="done" aria-label="${isDone?'Reopen task':'Complete task'}">${isDone?'✓':''}</button>`)
    : `<div class="check note">✦</div>`;
  const primaryActs = primaryActionLabels(item, isFocused);
  const primaryButtons = primaryActs.map(act => `<button class="btn slim ${['top3','taskify','reopenToday'].includes(act)?'primary':''} ${act==='untop3'?'warn':''}" data-act="${act}">${actionLabel(item, act)}</button>`).join('');
  const metaHtml = itemMeta(item).map(x => `<span>${h(x)}</span>`).join('') + ` ${item.routineId ? '<span>routine</span>' : ''} ${isFocused ? '<span class="badge focus">Focus</span>' : ''}`;

  if(item.kind === 'note'){
    const imageStrip = imageAttachments.length ? `
      <div class="note-attachments">
        ${imageAttachments.slice(0,3).map(att => `<img src="${att.dataUrl}" alt="" class="note-thumb" />`).join('')}
        ${imageAttachments.length > 3 ? `<div class="note-chip">+${imageAttachments.length - 3} more</div>` : ''}
        ${otherAttachments.length ? `<div class="note-chip">${otherAttachments.length === 1 ? '1 file' : `${otherAttachments.length} files`}</div>` : ''}
      </div>
    ` : (otherAttachments.length ? `<div class="note-attachments"><div class="note-chip">${otherAttachments.length === 1 ? '1 file attached' : `${otherAttachments.length} files attached`}</div></div>` : '');
    return `
      <div class="item kind-note state-${item.status} ${isFocused?'focused':''}" data-item="${item.id}">
        <div class="itemtop">
          ${check}
          <div class="itembody">
            ${item.status==='today' && !searchMode ? `<div class="note-eyebrow">For today</div>` : ''}
            <input class="itemtext ${item.status==='done'?'done':''}" value="${h(item.text)}" data-role="text" />
            ${detailPreview ? `<div class="note-preview">${h(detailPreview)}</div>` : ''}
            ${imageStrip}
            <div class="meta note">${metaHtml}</div>
          </div>
        </div>
        <div class="actions primary">
          ${primaryButtons}
          <button class="btn slim" data-act="more">More…</button>
        </div>
        ${searchMode ? `<div class="meta"><span>${h(niceStamp(item.updatedAt || item.createdAt))}</span></div>` : ''}
      </div>
    `;
  }

  return `
    <div class="item kind-task state-${item.status} ${isFocused?'focused':''}" data-item="${item.id}">
      <div class="itemtop">
        ${check}
        <div class="itembody">
          <input class="itemtext ${item.status==='done'?'done':''}" value="${h(item.text)}" data-role="text" />
          <div class="meta">${metaHtml}</div>
          ${detailPreview ? `<div class="task-preview">${h(detailPreview)}</div>` : ''}
        </div>
      </div>
      <div class="actions primary">
        ${primaryButtons}
        <button class="btn slim" data-act="more">More…</button>
      </div>
      ${searchMode ? `<div class="meta"><span>${h(niceStamp(item.updatedAt || item.createdAt))}</span></div>` : ''}
    </div>
  `;
}


function itemStatusAfterTaskify(id){
  const item = state.items.find(x => x.id === id);
  if(!item) return 'inbox';
  if(['today','later','waiting','done'].includes(item.status)) return item.status;
  return 'inbox';
}

function bindItemRows(root){
  [...root.querySelectorAll('[data-item]')].forEach(row => {
    const id = row.dataset.item;
    const input = row.querySelector('[data-role="text"]');
    if(input) input.onchange = e => updateItem(id, { text:e.target.value });
    [...row.querySelectorAll('[data-act]')].forEach(btn => btn.onclick = () => {
      const act = btn.dataset.act;
      if(act === 'done') return markDone(id);
      if(act === 'reopenToday') return updateItem(id, { status:'today', targetDate: state.currentDate }, { undoLabel:'Reopened task' });
      if(act === 'today') return updateItem(id, { status:'today', targetDate: state.currentDate }, { undoLabel:'Moved to Today' });
      if(act === 'removeToday') { const current = state.items.find(x => x.id === id); return updateItem(id, { status: current?.kind === 'note' ? 'inbox' : 'later', targetDate:'' }, { undoLabel:'Removed from Today' }); }
      if(act === 'later') return updateItem(id, { status:'later', targetDate:'' }, { undoLabel:'Sent to Queue' });
      if(act === 'schedule') return openScheduleSheet(id);
      if(act === 'waiting') return updateItem(id, { status:'waiting', targetDate:'' }, { undoLabel:'Moved to Waiting' });
      if(act === 'inbox') return updateItem(id, { status:'inbox', targetDate:'' }, { undoLabel:'Sent to Inbox' });
      if(act === 'archive') return updateItem(id, { status:'archived' }, { undoLabel:'Archived item' });
      if(act === 'restore') return updateItem(id, { status:'inbox', archivedAt:0 }, { undoLabel:'Restored item' });
      if(act === 'top3') return sendToTop3(id);
      if(act === 'untop3') return removeFromTop3(id);
      if(act === 'taskify') return updateItem(id, { kind:'task', status:itemStatusAfterTaskify(id) }, { undoLabel:'Converted to task' });
      if(act === 'noteify') {
        const current = state.items.find(x => x.id === id);
        const nextStatus = current?.status === 'done' ? 'inbox' : (current?.status || 'inbox');
        return updateItem(id, { kind:'note', status:nextStatus, targetDate: nextStatus === 'done' ? '' : (current?.targetDate || '') }, { undoLabel:'Converted to note' });
      }
      if(act === 'more') return openItemMoreSheet(id);
      if(act === 'delete') { if(confirm('Delete this item?')) removeItem(id, { undoLabel:'Deleted item' }); }
    });
  });
}

function openItemMoreSheet(id){
  const item = state.items.find(x => x.id === id); if(!item) return;
  const isFocused = activeDay().top3.includes(id);
  const actions = [];
  if(item.status === 'archived') actions.push('details','restore','delete');
  else if(item.kind === 'task' && item.status === 'done') actions.push('reopenToday','schedule','details','noteify','archive','delete');
  else if(item.kind === 'task') {
    if(item.status !== 'today') actions.push('today');
    if(item.status === 'today') actions.push('removeToday');
    actions.push('schedule','details', isFocused ? 'untop3' : 'top3', 'inbox','later','waiting','noteify','archive','delete');
  }
  else {
    actions.push(item.status === 'today' ? 'removeToday' : 'today', 'details','taskify','inbox','later','archive','delete');
  }
  const uniqueActions = actions.filter((act, idx) => actions.indexOf(act) === idx);
  openSheet(`
    <div class="stack">
      <div><div class="h2">${item.kind === 'note' ? 'Note' : 'Task'} options</div><div class="sub">${h(item.text)}</div></div>
      <div class="chips">${isFocused ? '<span class="badge focus">Focus</span>' : ''}<span class="badge ${item.status==='today'?'today':item.status==='waiting'?'waiting':item.status==='done'?'done':'later'}">${h(STATUS_LABEL[item.status] || item.status)}</span>${item.notes ? '<span class="badge">notes</span>' : ''}${(Array.isArray(item.attachments) ? item.attachments.filter(attachmentIsImage).length : 0) ? `<span class="badge">${item.attachments.filter(attachmentIsImage).length === 1 ? 'photo' : 'photos'}</span>` : ''}${(Array.isArray(item.attachments) ? item.attachments.filter(att => !attachmentIsImage(att)).length : 0) ? `<span class="badge">${item.attachments.filter(att => !attachmentIsImage(att)).length === 1 ? 'file' : 'files'}</span>` : ''}</div>
      <div class="stack">${uniqueActions.map(act => `<button class="btn full ${['delete'].includes(act)?'danger':''} ${['restore','top3','taskify','reopenToday','details'].includes(act)?'primary':''} ${act==='untop3'?'warn':''}" data-sheet-act="${act}">${actionLabel(item, act)}</button>`).join('')}</div>
    </div>
  `);
  [...document.querySelectorAll('[data-sheet-act]')].forEach(btn => btn.onclick = () => {
    const act = btn.dataset.sheetAct;
    closeSheet();
    if(act === 'details') return openItemDetailsSheet(id);
    if(act === 'reopenToday') return updateItem(id, { status:'today', targetDate: state.currentDate }, { undoLabel:'Reopened task' });
    if(act === 'today') return updateItem(id, { status:'today', targetDate: state.currentDate }, { undoLabel:'Moved to Today' });
    if(act === 'removeToday') {
      const current = state.items.find(x => x.id === id);
      return updateItem(id, { status: current?.kind === 'note' ? 'inbox' : 'later', targetDate:'' }, { undoLabel:'Removed from Today' });
    }
    if(act === 'schedule') return openScheduleSheet(id);
    if(act === 'top3') return sendToTop3(id);
    if(act === 'untop3') return removeFromTop3(id);
    if(act === 'later') return updateItem(id, { status:'later', targetDate:'' }, { undoLabel:'Sent to Queue' });
    if(act === 'waiting') return updateItem(id, { status:'waiting', targetDate:'' }, { undoLabel:'Moved to Waiting' });
    if(act === 'inbox') return updateItem(id, { status:'inbox', targetDate:'' }, { undoLabel:'Sent to Inbox' });
    if(act === 'archive') return updateItem(id, { status:'archived' }, { undoLabel:'Archived item' });
    if(act === 'restore') return updateItem(id, { status:'inbox', archivedAt:0 }, { undoLabel:'Restored item' });
    if(act === 'noteify') {
      const current = state.items.find(x => x.id === id);
      const nextStatus = current?.status === 'done' ? 'inbox' : (current?.status || 'inbox');
      return updateItem(id, { kind:'note', status:nextStatus, targetDate: nextStatus === 'done' ? '' : (current?.targetDate || '') }, { undoLabel:'Converted to note' });
    }
    if(act === 'taskify') return updateItem(id, { kind:'task', status:itemStatusAfterTaskify(id) }, { undoLabel:'Converted to task' });
    if(act === 'delete') { if(confirm('Delete this item?')) removeItem(id, { undoLabel:'Deleted item' }); }
  });
}

function openItemDetailsSheet(id){
  const item = state.items.find(x => x.id === id); if(!item) return;
  let draftNotes = item.notes || '';
  let draftAttachments = Array.isArray(item.attachments) ? item.attachments.map(normalizeAttachment) : [];

  const imageAttachments = () => draftAttachments.filter(attachmentIsImage);
  const fileAttachments = () => draftAttachments.filter(att => !attachmentIsImage(att));
  const imageFilename = (att) => att?.name || `${String(item.text || 'photo').trim().replace(/[^a-z0-9]+/gi,'-').replace(/^-+|-+$/g,'').toLowerCase() || 'photo'}.jpg`;
  const renameAttachment = (attachmentId) => {
    const current = draftAttachments.find(att => att.id === attachmentId);
    if(!current) return;
    const nextName = prompt('Name this attachment', current.name || 'attachment');
    if(nextName === null) return;
    const trimmed = String(nextName).trim();
    if(!trimmed) return;
    draftAttachments = draftAttachments.map(att => att.id === attachmentId ? { ...att, name: trimmed } : att);
  };

  const renderAttachmentCard = (att, label) => {
    const isImage = attachmentIsImage(att);
    return `
      <div class="card" style="padding:12px; display:flex; gap:12px; align-items:flex-start">
        ${isImage ? `<img src="${att.dataUrl}" alt="" style="width:64px; height:64px; border-radius:14px; border:1px solid var(--line); object-fit:cover; flex:0 0 auto" />` : `<div style="width:64px; height:64px; border-radius:14px; border:1px solid var(--line); display:grid; place-items:center; background:rgba(255,255,255,.05); font-size:11px; letter-spacing:.12em; color:rgba(246,252,248,.78); flex:0 0 auto">${h(extensionOf(att.name))}</div>`}
        <div style="min-width:0; width:100%">
          <div style="font-weight:600; color:rgba(246,252,248,.96); overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${h(att.name)}</div>
          <div class="subtle" style="margin-top:2px">${h(label)} · ${h(attachmentLabel(att))}</div>
          <div class="row" style="margin-top:8px">
            <button class="btn slim primary" data-attachment-view="${att.id}">${isImage ? 'View photo' : (/^audio\//i.test(String(att.type||'')) ? 'Play memo' : (attachmentPreviewable(att) ? 'View file' : 'Open file'))}</button>
            <button class="btn slim" data-attachment-rename="${att.id}">Rename</button>
            <button class="btn slim" data-attachment-download="${att.id}">Download</button>
            <button class="btn slim danger" data-attachment-remove="${att.id}">Remove</button>
          </div>
        </div>
      </div>
    `;
  };

  const openAttachmentViewer = (attachmentId) => {
    const attachment = draftAttachments.find(att => att.id === attachmentId);
    if(!attachment) return renderDetails();

    if(!attachmentIsImage(attachment)){
      const type = String(attachment?.type || '');
      const isAudio = /^audio\//i.test(type);
      const previewable = attachmentPreviewable(attachment);
      if(!previewable){
        openAttachmentExternal(attachment);
        return;
      }
      openSheet(`
        <div class="stack">
          <div class="row space"><div><div class="h2">${isAudio ? 'Voice memo' : 'File preview'}</div><div class="sub">${h(attachment.name)}</div></div><button class="btn slim" id="backToDetailsBtn">Back</button></div>
          <div class="subtle">${h(attachmentLabel(attachment))}</div>
          ${isAudio
            ? `<div class="card" style="padding:16px"><audio controls preload="metadata" src="${attachment.dataUrl}" style="width:100%"></audio></div>`
            : `<div class="card" style="padding:10px; height:min(58vh,520px)"><iframe src="${attachment.dataUrl}" title="${h(attachment.name)}" style="width:100%; height:100%; border:none; border-radius:16px; background:#fff"></iframe></div>`}
          <div class="row">
            ${isAudio ? '' : '<button class="btn" id="openAttachmentBtn">Open in browser</button>'}
            <button class="btn" id="renameAttachmentBtn">Rename</button>
            <button class="btn" id="downloadAttachmentBtn">Download</button>
            <button class="btn danger" id="removeAttachmentBtn">Remove</button>
          </div>
        </div>
      `);
      document.getElementById('backToDetailsBtn').onclick = renderDetails;
      const openAttachmentBtn = document.getElementById('openAttachmentBtn');
      if(openAttachmentBtn) openAttachmentBtn.onclick = () => openAttachmentExternal(attachment);
      document.getElementById('renameAttachmentBtn').onclick = () => {
        renameAttachment(attachmentId);
        openAttachmentViewer(attachmentId);
      };
      document.getElementById('downloadAttachmentBtn').onclick = () => {
        const updated = draftAttachments.find(att => att.id === attachmentId) || attachment;
        triggerDownload(updated.dataUrl, updated.name || 'attachment');
      };
      document.getElementById('removeAttachmentBtn').onclick = () => {
        draftAttachments = draftAttachments.filter(att => att.id !== attachmentId);
        renderDetails();
      };
      return;
    }

    let current = draftAttachments.filter(attachmentIsImage).findIndex(att => att.id === attachmentId);
    let zoom = 1;

    const renderPhotoViewer = () => {
      const photos = draftAttachments.filter(attachmentIsImage);
      const photo = photos[current];
      if(!photo) return renderDetails();
      openSheet(`
        <div class="stack">
          <div class="row space"><div><div class="h2">Photo viewer</div><div class="sub">${current + 1} of ${photos.length} · ${h(photo.name)}</div></div><button class="btn slim" id="backToDetailsBtn">Back</button></div>
          <div class="card" style="padding:10px; overflow:auto; min-height:42vh; max-height:62vh; display:grid; place-items:center; background:rgba(0,0,0,.24)">
            <img id="viewerImage" src="${photo.dataUrl}" alt="" style="max-width:100%; max-height:56vh; transform:scale(${zoom}); transform-origin:center center; transition:transform .16s ease; border-radius:18px; border:1px solid var(--line)" />
          </div>
          <div class="row" style="justify-content:center">
            <button class="btn slim" id="prevPhotoBtn" ${current === 0 ? 'disabled' : ''}>← Previous</button>
            <button class="btn slim" id="zoomOutBtn">－</button>
            <button class="btn slim" id="zoomResetBtn">Reset</button>
            <button class="btn slim" id="zoomInBtn">＋</button>
            <button class="btn slim" id="nextPhotoBtn" ${current === photos.length - 1 ? 'disabled' : ''}>Next →</button>
          </div>
          <div class="row">
            <button class="btn" id="openPhotoBtn">Open in browser</button>
            <button class="btn" id="renamePhotoBtn">Rename</button>
            <button class="btn" id="downloadPhotoBtn">Download</button>
            <button class="btn danger" id="removePhotoBtn">Remove</button>
          </div>
        </div>
      `);
      document.getElementById('backToDetailsBtn').onclick = renderDetails;
      const updateZoom = () => {
        const img = document.getElementById('viewerImage');
        if(img) img.style.transform = `scale(${zoom})`;
      };
      const prev = document.getElementById('prevPhotoBtn');
      if(prev) prev.onclick = () => { current = Math.max(0, current - 1); zoom = 1; renderPhotoViewer(); };
      const next = document.getElementById('nextPhotoBtn');
      if(next) next.onclick = () => { current = Math.min(photos.length - 1, current + 1); zoom = 1; renderPhotoViewer(); };
      document.getElementById('zoomOutBtn').onclick = () => { zoom = Math.max(0.5, Number((zoom - 0.25).toFixed(2))); updateZoom(); };
      document.getElementById('zoomInBtn').onclick = () => { zoom = Math.min(4, Number((zoom + 0.25).toFixed(2))); updateZoom(); };
      document.getElementById('zoomResetBtn').onclick = () => { zoom = 1; updateZoom(); };
      document.getElementById('openPhotoBtn').onclick = () => openAttachmentExternal(photo);
      document.getElementById('renamePhotoBtn').onclick = () => {
        renameAttachment(photo.id);
        renderPhotoViewer();
      };
      document.getElementById('downloadPhotoBtn').onclick = () => {
        const updated = draftAttachments.find(att => att.id === photo.id) || photo;
        triggerDownload(updated.dataUrl, imageFilename(updated));
      };
      document.getElementById('removePhotoBtn').onclick = () => {
        draftAttachments = draftAttachments.filter(att => att.id !== photo.id);
        const remainingPhotos = draftAttachments.filter(attachmentIsImage);
        if(!remainingPhotos.length) return renderDetails();
        current = Math.min(current, remainingPhotos.length - 1);
        renderPhotoViewer();
      };
    };

    renderPhotoViewer();
  };

  const renderDetails = () => {
    const photos = imageAttachments();
    const files = fileAttachments();
    openSheet(`
      <div class="stack">
        <div><div class="h2">Notes & files</div><div class="sub">${h(item.text)}</div></div>
        <label class="stack" style="gap:6px">
          <span class="label">Notes & context</span>
          <textarea id="detailNotes" rows="6" placeholder="Anything useful that should stay with this item.">${h(draftNotes)}</textarea>
          <div class="row">
            <button class="btn slim" type="button" id="detailDictateBtn">Dictate notes</button>
          </div>
          <div class="helper" id="detailDictateStatus"></div>
        </label>
        <div class="stack" style="gap:8px">
          <span class="label">Photos</span>
          ${photos.length ? `<div class="stack" style="gap:10px">${photos.map(att => renderAttachmentCard(att, 'Photo')).join('')}</div>` : `<div class="helper">Add reference photos that you may want to look back at later.</div>`}
          <div class="row">
            <label class="btn slim"><input type="file" id="detailPhotosInput" accept="image/*" multiple style="display:none" />Add photos</label>
          </div>
        </div>
        <div class="stack" style="gap:8px">
          <span class="label">Files & documents</span>
          ${files.length ? `<div class="stack" style="gap:10px">${files.map(att => renderAttachmentCard(att, 'File')).join('')}</div>` : `<div class="helper">Attach files or documents so they stay with this item.</div>`}
          <div class="row">
            <label class="btn slim"><input type="file" id="detailFilesInput" multiple style="display:none" />Attach files</label>
          </div>
        </div>
        <div class="stack" style="gap:8px">
          <span class="label">Voice memos</span>
          <div class="row">
            <button class="btn slim" type="button" id="recordAudioBtn">Record voice memo</button>
          </div>
          <div class="helper" id="recordAudioStatus">Record one or more voice memos and keep them with this item.</div>
        </div>
        <div class="row"><button class="btn primary full" id="saveDetailsBtn">Save notes & files</button></div>
      </div>
    `);
    const notesEl = document.getElementById('detailNotes');
    notesEl.oninput = e => { draftNotes = e.target.value; };
    const detailDictation = wireDictationButton({ button:document.getElementById('detailDictateBtn'), target:notesEl, statusEl:document.getElementById('detailDictateStatus'), multiline:true });
    let activeAudioCapture = null;
    const photosEl = document.getElementById('detailPhotosInput');
    if(photosEl) photosEl.onchange = async e => {
      const files = [...(e.target.files || [])];
      if(!files.length) return;
      try{
        const next = [];
        for(const file of files){
          const dataUrl = await compressImageFile(file);
          next.push(normalizeAttachment({
            id: uid(),
            name: file?.name || imageFilename(),
            type: file?.type || 'image/jpeg',
            size: Number(file?.size || 0),
            dataUrl
          }));
        }
        draftAttachments = [...draftAttachments, ...next];
        renderDetails();
      }catch(err){
        console.error(err);
        alert('Could not add those photos.');
      }
    };
    const filesEl = document.getElementById('detailFilesInput');
    if(filesEl) filesEl.onchange = async e => {
      const files = [...(e.target.files || [])];
      if(!files.length) return;
      try{
        const next = [];
        for(const file of files) next.push(await fileToAttachment(file));
        syncDetailsDraft();
        draftAttachments = [...draftAttachments, ...next];
        renderDetails();
      }catch(err){
        console.error(err);
        alert('Could not add those files.');
      }
    };
    const syncDetailsDraft = () => { draftNotes = detailDictation.currentValue() || notesEl.value || draftNotes; detailDictation.stop(); };
    [...document.querySelectorAll('[data-attachment-view]')].forEach(btn => btn.onclick = () => { syncDetailsDraft(); openAttachmentViewer(btn.dataset.attachmentView); });
    [...document.querySelectorAll('[data-attachment-rename]')].forEach(btn => btn.onclick = () => {
      syncDetailsDraft();
      renameAttachment(btn.dataset.attachmentRename);
      renderDetails();
    });
    [...document.querySelectorAll('[data-attachment-download]')].forEach(btn => btn.onclick = () => {
      const att = draftAttachments.find(x => x.id === btn.dataset.attachmentDownload); if(!att) return;
      triggerDownload(att.dataUrl, att.name || 'attachment');
    });
    [...document.querySelectorAll('[data-attachment-remove]')].forEach(btn => btn.onclick = () => {
      syncDetailsDraft();
      draftAttachments = draftAttachments.filter(att => att.id !== btn.dataset.attachmentRemove);
      renderDetails();
    });
    const recordBtn = document.getElementById('recordAudioBtn');
    const recordStatus = document.getElementById('recordAudioStatus');
    const saveDetailsBtn = document.getElementById('saveDetailsBtn');
    let detailTimer = null;
    const stopDetailTimer = () => { if(detailTimer){ clearInterval(detailTimer); detailTimer = null; } };
    const startDetailTimer = () => {
      stopDetailTimer();
      detailTimer = setInterval(() => {
        if(activeAudioCapture && recordStatus) recordStatus.textContent = `Recording… ${formatDuration(Date.now() - activeAudioCapture.startedAt())} — tap stop when you are done.`;
      }, 500);
    };
    if(recordBtn){
      if(!supportsAudioRecording()){
        recordBtn.disabled = true;
        recordStatus.textContent = 'Voice recording is not available in this browser.';
      }else{
        recordBtn.onclick = async () => {
          try{
            if(activeAudioCapture){
              recordBtn.disabled = true;
              if(saveDetailsBtn) saveDetailsBtn.disabled = true;
              recordStatus.textContent = 'Saving voice memo…';
              const attachment = await activeAudioCapture.stop();
              activeAudioCapture = null;
              stopDetailTimer();
              if(attachment){
                const chosenName = prompt('Name this voice memo', attachment.name || 'voice-memo.webm');
                if(chosenName !== null && String(chosenName).trim()) attachment.name = String(chosenName).trim();
                draftAttachments = [...draftAttachments, attachment];
                renderDetails();
              }else{
                recordBtn.disabled = false;
                if(saveDetailsBtn) saveDetailsBtn.disabled = false;
                recordBtn.textContent = 'Record voice memo';
                recordStatus.textContent = 'Could not save that voice memo.';
              }
              return;
            }
            activeAudioCapture = await recordAudioAttachment();
            recordBtn.textContent = 'Stop recording';
            if(saveDetailsBtn) saveDetailsBtn.disabled = true;
            recordStatus.textContent = 'Recording… 0:00 — tap stop when you are done.';
            startDetailTimer();
          }catch(err){
            console.error(err);
            recordStatus.textContent = 'Could not start voice recording.';
          }
        };
      }
    }
    if(saveDetailsBtn) saveDetailsBtn.disabled = !!activeAudioCapture;
    saveDetailsBtn.onclick = () => {
      draftNotes = notesEl.value || draftNotes || '';
      updateItem(id, { notes: draftNotes.trim(), imageData: '', attachments: draftAttachments.map(normalizeAttachment) }, { undoLabel:'Saved notes & files' });
      closeSheet(true);
    };
    sheetBeforeClose = () => activeAudioCapture ? confirm('Discard the recording in progress?') : true;
    sheetCleanup = () => {
      draftNotes = detailDictation.currentValue() || notesEl.value || draftNotes;
      detailDictation.stop();
      stopDetailTimer();
      if(activeAudioCapture){ const capture = activeAudioCapture; activeAudioCapture = null; capture.discard?.(); }
    };
  };

  renderDetails();
}

function scheduledItemsInView(){
  return state.items
    .filter(item => item.status === 'later' && item.targetDate && inWindow(item.targetDate, state.currentDate, state.planSpan))
    .sort((a,b) => (a.targetDate || '').localeCompare(b.targetDate || '') || (a.targetTime || '').localeCompare(b.targetTime || '') || (a.updatedAt - b.updatedAt));
}
function unscheduledLaterItems(){
  return state.items.filter(item => item.status === 'later' && !item.targetDate);
}
function nextScheduledItems(limit=4){
  return state.items
    .filter(item => item.status === 'later' && item.targetDate && item.targetDate > state.currentDate)
    .sort((a,b) => (a.targetDate || '').localeCompare(b.targetDate || '') || (a.targetTime || '').localeCompare(b.targetTime || '') || (a.updatedAt - b.updatedAt))
    .slice(0, limit);
}
function groupedScheduledMarkup(items){
  if(!items.length) return `<div class="empty">Nothing planned for this view.</div>`;
  const groups = {};
  items.forEach(item => { (groups[item.targetDate] ||= []).push(item); });
  return Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0])).map(([date, list]) => `

}

  }

    openSheet(`
