        <div><div class="h2">Add</div><div class="sub">${kind==='task' ? 'Something you need to do.' : 'Something you want to keep.'}</div></div>
        <div class="row" style="gap:8px;flex-wrap:wrap">
          <button class="btn slim" type="button" id="openQuickVoiceMemoBtn">Quick voice memo</button>
        </div>
        <div class="stack" style="gap:8px">
          <div class="row" style="gap:8px; align-items:flex-start">
            <input class="field" id="sheetText" type="text" placeholder="What needs a place?" value="${h(draftText)}" style="flex:1 1 auto" />
            <button class="btn slim" type="button" id="dictateAddBtn">Dictate</button>
          </div>
          <div class="helper" id="dictateAddStatus"></div>
        </div>
        <div class="sheet-grid two">
          <label class="stack" style="gap:6px">
            <span class="label">Type</span>
            <div class="seg" id="sheetKindSwitch">
              <button class="chip ${kind==='task'?'active':''}" type="button" data-kind="task">Task</button>
              <button class="chip ${kind==='note'?'active':''}" type="button" data-kind="note">Note</button>
            </div>
          </label>
          <label class="stack" style="gap:6px">
            <span class="label">Area</span>
            <select id="sheetLane">${LANES.map(l => `<option value="${l.key}" ${lane===l.key?'selected':''}>${l.label}</option>`).join('')}</select>
          </label>
        </div>
        <label class="stack" style="gap:6px">
          <span class="label">Place</span>
          <div class="seg" id="sheetDestSwitch">
            <button class="chip ${status==='inbox'?'active':''}" type="button" data-status="inbox">Inbox</button>
            <button class="chip ${status==='today'?'active':''}" type="button" data-status="today">Today</button>
            <button class="chip ${status==='later'?'active':''}" type="button" data-status="later">Upcoming</button>
          </div>
        </label>
        ${isUpcoming ? `
          <label class="stack" style="gap:6px">
            <span class="label">When</span>
            <div class="seg" id="sheetWhenSwitch">
              ${quickOptions.map(([key,label]) => `<button class="chip ${timing===key?'active':''}" type="button" data-when="${key}">${label}</button>`).join('')}
            </div>
          </label>
          ${needsDate ? `
            <label class="stack" style="gap:6px">
              <span class="label">Date</span>
              <div class="datepick">
                <input class="field" id="sheetDateText" type="text" inputmode="numeric" placeholder="YYYY-MM-DD" value="${h(chosenDate)}" />
                <button class="btn slim" type="button" id="sheetDateBtn" aria-label="Choose date">📅</button>
                <input class="native-date-proxy" id="sheetDateNative" type="date" value="${h(chosenDate)}" tabindex="-1" aria-hidden="true" />
              </div>
            </label>
          ` : `<div class="helper">${timing==='someday' ? 'This will stay in Upcoming without a date.' : 'You can still fine-tune the date later.'}</div>`}
        ` : `<div class="helper">${kind==='task' ? 'Use Inbox to catch it fast. Use Today only when it already matters now.' : 'Keep notes in Inbox unless they need to stay in front of you today.'}</div>`}
        ${canHaveTime ? `
          <label class="stack" style="gap:6px">
            <span class="label">Time</span>
            <div class="seg" id="sheetTimeSwitch">
              ${timeOptions.map(([key,label]) => `<button class="chip ${timeMode===key?'active':''}" type="button" data-time-mode="${key}">${label}</button>`).join('')}
            </div>
          </label>
          ${showTime ? `<div class="timepick"><input class="field" id="sheetTimeText" type="text" inputmode="numeric" placeholder="HH:MM or 9am" value="${h(chosenTime)}" /><button class="btn slim" type="button" id="sheetTimeBtn" aria-label="Choose time">🕘</button><input class="native-time-proxy" id="sheetTimeNative" type="time" value="${h(chosenTime)}" tabindex="-1" aria-hidden="true" /></div>` : `<div class="helper">${timeMode==='notime' ? 'Add a time only when it actually matters.' : 'This will show on the item and in Upcoming.'}</div>`}
        ` : ''}
        <button class="btn primary" id="sheetSubmitBtn">${submitLabel()}</button>
      </div>
    `);

    const textEl = document.getElementById('sheetText');
    textEl.focus();
    textEl.setSelectionRange(draftText.length, draftText.length);
    textEl.oninput = e => { draftText = e.target.value; };
    textEl.onkeydown = e => { if(e.key === 'Enter'){ e.preventDefault(); submit(); } };
    const addDictation = wireDictationButton({ button:document.getElementById('dictateAddBtn'), target:textEl, statusEl:document.getElementById('dictateAddStatus') });
    const syncAddDraft = () => { draftText = addDictation.currentValue() || textEl.value || draftText; addDictation.stop(); };
    sheetBeforeClose = () => true;
    sheetCleanup = () => { syncAddDraft(); };
    document.getElementById('openQuickVoiceMemoBtn').onclick = () => { syncAddDraft(); openVoiceMemoSheet(status); };
    document.getElementById('sheetLane').onchange = e => { lane = e.target.value; state.quickLane = lane; save(); };
    [...document.querySelectorAll('#sheetKindSwitch [data-kind]')].forEach(btn => btn.onclick = () => { syncAddDraft(); kind = btn.dataset.kind; state.quickKind = kind; save(); renderForm(); });
    [...document.querySelectorAll('#sheetDestSwitch [data-status]')].forEach(btn => btn.onclick = () => { syncAddDraft(); status = btn.dataset.status; if(status !== 'later') timing = 'tomorrow'; renderForm(); });
    [...document.querySelectorAll('#sheetWhenSwitch [data-when]')].forEach(btn => btn.onclick = () => { syncAddDraft(); timing = btn.dataset.when; renderForm(); });
    [...document.querySelectorAll('#sheetTimeSwitch [data-time-mode]')].forEach(btn => btn.onclick = () => { syncAddDraft(); const mode = btn.dataset.timeMode; timeMode = mode; if(mode === 'notime') chosenTime = ''; else if(mode !== 'time') chosenTime = quickTimeValueForMode(mode, previewDate); renderForm(); });
    if(needsDate && document.getElementById('sheetDateText')) bindDateControl({ textId:'sheetDateText', nativeId:'sheetDateNative', buttonId:'sheetDateBtn', onCommit: v => { chosenDate = v; } });
    if(showTime && document.getElementById('sheetTimeText')) bindTimeControl({ textId:'sheetTimeText', nativeId:'sheetTimeNative', buttonId:'sheetTimeBtn', onCommit: v => { chosenTime = v; } });
    document.getElementById('sheetSubmitBtn').onclick = submit;
  };

  const submit = () => {
    const text = (document.getElementById('sheetText')?.value || draftText || '').trim();
    if(!text) return;
    state.quickKind = kind;
    state.quickLane = lane;
    let targetDate = '';
    let targetTime = '';
    if(status === 'today') targetDate = state.currentDate;
    else if(status === 'later'){
      if(timing === 'tomorrow') targetDate = addDays(state.currentDate, 1);
      if(timing === 'thisweek') targetDate = endOfWeek(state.currentDate);
      if(timing === 'nextweek') targetDate = addDays(endOfWeek(state.currentDate), 1);
      if(timing === 'date') targetDate = getDateControlValue('sheetDateText', 'sheetDateNative', chosenDate) || chosenDate;
      if(timing === 'someday') targetDate = '';
    }
    if(status !== 'inbox' && timeMode !== 'notime'){
      if(timeMode === 'time') targetTime = getTimeControlValue('sheetTimeText', 'sheetTimeNative', chosenTime) || chosenTime;
      else targetTime = chosenTime;
    }
    createItem(text, { kind, lane, status, targetDate, targetTime });
    closeSheet();
    showToast(status === 'today' ? 'Added to Today' : status === 'later' ? 'Added to Upcoming' : 'Added to Inbox');
  };

  renderForm();
}

function openVoiceMemoSheet(defaultStatus='inbox'){
  let lane = state.quickLane || 'admin';
  let status = defaultStatus;
  let timing = 'tomorrow';
  let chosenDate = addDays(state.currentDate, 1);
  let chosenTime = '';
  let timeMode = 'notime';
  let title = '';
  let memoAttachments = [];
  let recorderControl = null;
  let isRecording = false;
  let voiceTimer = null;
  const stopVoiceTimer = () => { if(voiceTimer){ clearInterval(voiceTimer); voiceTimer = null; } };
  const startVoiceTimer = () => {
    stopVoiceTimer();
    voiceTimer = setInterval(() => {
      const statusEl = document.getElementById('voiceMemoStatus');
      if(isRecording && recorderControl && statusEl) statusEl.textContent = `Recording… ${formatDuration(Date.now() - recorderControl.startedAt())} — tap stop when you are done.`;
    }, 500);
  };
  const preserveName = (nextName, oldName='voice-memo.webm') => {
    const raw = String(nextName || '').trim();
    if(!raw) return oldName;
    const ext = String(oldName || '').includes('.') ? String(oldName).slice(String(oldName).lastIndexOf('.')) : '';
    return /\.[A-Za-z0-9]+$/.test(raw) ? raw : `${raw}${ext}`;
  };
  const defaultMemoTitle = () => {
    const d = new Date();
    const pad = n => String(n).padStart(2,'0');
    return `Voice memo ${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };
  const previewVoiceMemo = (attachmentId) => {
    const att = memoAttachments.find(a => a.id === attachmentId);
    if(!att) return renderVoice();
    openSheet(`
      <div class="stack">
        <div class="row space"><div><div class="h2">Voice memo</div><div class="sub">${h(att.name)}</div></div><button class="btn slim" id="backToVoiceMemoBtn">Back</button></div>
        <div class="card" style="padding:16px"><audio controls preload="metadata" src="${att.dataUrl}" style="width:100%"></audio></div>
        <div class="row">
          <button class="btn" id="downloadVoiceMemoBtn">Download</button>
          <button class="btn" id="renameVoiceMemoBtn">Rename</button>
          <button class="btn danger" id="removeVoiceMemoBtn">Remove</button>
        </div>
      </div>
    `);
    document.getElementById('backToVoiceMemoBtn').onclick = renderVoice;
    document.getElementById('downloadVoiceMemoBtn').onclick = () => triggerDownload(att.dataUrl, att.name || 'voice-memo.webm');
    document.getElementById('renameVoiceMemoBtn').onclick = () => {
      const next = prompt('Rename attachment', att.name || 'voice-memo.webm');
      if(next !== null) att.name = preserveName(next, att.name || 'voice-memo.webm');
      previewVoiceMemo(attachmentId);
    };
    document.getElementById('removeVoiceMemoBtn').onclick = () => {
      memoAttachments = memoAttachments.filter(a => a.id !== attachmentId);
      renderVoice();
    };
  };
  const quickOptions = [
    ['tomorrow','Tomorrow'],
    ['thisweek','This week'],
    ['nextweek','Next week'],
    ['date','Pick date'],
    ['someday','No date']
  ];

  const submitLabel = () => status === 'today' ? 'Save to Today' : status === 'later' ? 'Save to Upcoming' : 'Save to Inbox';

  const renderVoice = () => {
    const isUpcoming = status === 'later';
    const needsDate = isUpcoming && timing === 'date';
    const previewDate = status === 'today' ? state.currentDate : (resolvePlannedDate(timing, state.currentDate, chosenDate) || state.currentDate);
    const timeOptions = quickTimeOptionsForDate(previewDate);
    const canHaveTime = status === 'today' || (isUpcoming && timing !== 'someday');
    const showTime = canHaveTime && timeMode === 'time';
    openSheet(`
      <div class="stack">
        <div><div class="h2">Quick voice memo</div><div class="sub">Capture it fast, then sort it later if you need to.</div></div>
        <label class="stack" style="gap:6px">
          <span class="label">Title</span>
          <input class="field" id="voiceMemoTitle" type="text" placeholder="Voice memo" value="${h(title)}" />
        </label>
        <div class="sheet-grid two">
          <label class="stack" style="gap:6px">
            <span class="label">Area</span>
            <select id="voiceMemoLane">${LANES.map(l => `<option value="${l.key}" ${lane===l.key?'selected':''}>${l.label}</option>`).join('')}</select>
          </label>
          <label class="stack" style="gap:6px">
            <span class="label">Place</span>
            <div class="seg" id="voiceMemoStatusSwitch">
              <button class="chip ${status==='inbox'?'active':''}" type="button" data-status="inbox">Inbox</button>
              <button class="chip ${status==='today'?'active':''}" type="button" data-status="today">Today</button>
              <button class="chip ${status==='later'?'active':''}" type="button" data-status="later">Upcoming</button>
            </div>
          </label>
        </div>
        ${isUpcoming ? `
          <label class="stack" style="gap:6px">
            <span class="label">When</span>
            <div class="seg" id="voiceMemoWhenSwitch">
              ${quickOptions.map(([key,label]) => `<button class="chip ${timing===key?'active':''}" type="button" data-when="${key}">${label}</button>`).join('')}
            </div>
          </label>
          ${needsDate ? `
            <label class="stack" style="gap:6px">
              <span class="label">Date</span>
              <div class="datepick">
                <input class="field" id="voiceMemoDateText" type="text" inputmode="numeric" placeholder="YYYY-MM-DD" value="${h(chosenDate)}" />
                <button class="btn slim" type="button" id="voiceMemoDateBtn" aria-label="Choose date">📅</button>
                <input class="native-date-proxy" id="voiceMemoDateNative" type="date" value="${h(chosenDate)}" tabindex="-1" aria-hidden="true" />
              </div>
            </label>
          ` : `<div class="helper">${timing==='someday' ? 'This will stay in Upcoming without a date.' : 'You can fine-tune the date later.'}</div>`}
        ` : `<div class="helper">Save it fast. You can sort or rename it later if you need to.</div>`}
        ${canHaveTime ? `
          <label class="stack" style="gap:6px">
            <span class="label">Time</span>
            <div class="seg" id="voiceMemoTimeSwitch">
              ${timeOptions.map(([key,label]) => `<button class="chip ${timeMode===key?'active':''}" type="button" data-time-mode="${key}">${label}</button>`).join('')}
            </div>
          </label>
          ${showTime ? `<div class="timepick"><input class="field" id="voiceMemoTimeText" type="text" inputmode="numeric" placeholder="HH:MM or 9am" value="${h(chosenTime)}" /><button class="btn slim" type="button" id="voiceMemoTimeBtn" aria-label="Choose time">🕘</button><input class="native-time-proxy" id="voiceMemoTimeNative" type="time" value="${h(chosenTime)}" tabindex="-1" aria-hidden="true" /></div>` : `<div class="helper">${timeMode==='notime' ? 'Add a time only if it helps later.' : 'This will show on the memo and in Upcoming.'}</div>`}
        ` : ''}
        <div class="card stack" style="gap:10px">
          <div class="row" style="justify-content:space-between;align-items:center;gap:10px">
            <div>
              <div class="label">Recording</div>
              <div class="sub" id="voiceMemoStatus">${isRecording ? 'Recording… tap stop when you are done.' : (memoAttachments.length ? `${memoAttachments.length} memo${memoAttachments.length===1?'':'s'} ready.` : 'Tap record when you want to capture a memo.')}</div>
            </div>
            <button class="btn primary" type="button" id="voiceMemoRecordBtn">${isRecording ? 'Stop' : (memoAttachments.length ? 'Record another' : 'Record')}</button>
          </div>
          ${memoAttachments.length ? `<div class="stack" style="gap:8px">${memoAttachments.map(att => `<div class="attach-row"><div><div class="attach-name">${h(att.name)}</div><div class="attach-meta">${fmtBytes(att.size)}</div></div><div class="row" style="gap:6px"><button class="btn slim" type="button" data-voice-play="${att.id}">Play</button><button class="btn slim" type="button" data-voice-rename="${att.id}">Rename</button><button class="btn slim danger" type="button" data-voice-remove="${att.id}">Remove</button></div></div>`).join('')}</div>` : ''}
        </div>
        <button class="btn primary" id="voiceMemoSaveBtn" ${(memoAttachments.length && !isRecording)?'':'disabled'}>${isRecording ? 'Stop recording first' : submitLabel()}</button>
      </div>
    `);

    const titleEl = document.getElementById('voiceMemoTitle');
    titleEl.focus();
    titleEl.setSelectionRange(title.length, title.length);
    titleEl.oninput = e => { title = e.target.value; };
    document.getElementById('voiceMemoLane').onchange = e => { lane = e.target.value; state.quickLane = lane; save(); };
    [...document.querySelectorAll('#voiceMemoStatusSwitch [data-status]')].forEach(btn => btn.onclick = () => { status = btn.dataset.status; if(status !== 'later') timing = 'tomorrow'; renderVoice(); });
    [...document.querySelectorAll('#voiceMemoWhenSwitch [data-when]')].forEach(btn => btn.onclick = () => { timing = btn.dataset.when; renderVoice(); });
    [...document.querySelectorAll('#voiceMemoTimeSwitch [data-time-mode]')].forEach(btn => btn.onclick = () => { const mode = btn.dataset.timeMode; timeMode = mode; if(mode === 'notime') chosenTime = ''; else if(mode !== 'time') chosenTime = quickTimeValueForMode(mode, previewDate); renderVoice(); });
    if(needsDate && document.getElementById('voiceMemoDateText')) bindDateControl({ textId:'voiceMemoDateText', nativeId:'voiceMemoDateNative', buttonId:'voiceMemoDateBtn', onCommit: v => { chosenDate = v; } });
    if(showTime && document.getElementById('voiceMemoTimeText')) bindTimeControl({ textId:'voiceMemoTimeText', nativeId:'voiceMemoTimeNative', buttonId:'voiceMemoTimeBtn', onCommit: v => { chosenTime = v; } });

    const recordBtn = document.getElementById('voiceMemoRecordBtn');
    const recordStatus = document.getElementById('voiceMemoStatus');
    const saveVoiceBtn = document.getElementById('voiceMemoSaveBtn');
    if(recordBtn){
      recordBtn.onclick = async () => {
        if(isRecording && recorderControl){
          recordBtn.disabled = true;
          if(saveVoiceBtn) saveVoiceBtn.disabled = true;
          recordStatus.textContent = 'Saving voice memo…';
          const attachment = await recorderControl.stop();
          recorderControl = null;
          isRecording = false;
          stopVoiceTimer();
          if(attachment){
            const currentTitle = (document.getElementById('voiceMemoTitle')?.value || title || '').trim();
            const defaultName = currentTitle ? preserveName(currentTitle, attachment.name || 'voice-memo.webm') : (attachment.name || 'voice-memo.webm');
            const chosenName = prompt('Name this voice memo', defaultName);
            if(chosenName !== null){
              attachment.name = preserveName(chosenName, attachment.name || defaultName || 'voice-memo.webm');
            }
            memoAttachments = [...memoAttachments, attachment];
          }
          renderVoice();
          return;
        }
        try{
          recorderControl = await recordAudioAttachment();
          isRecording = true;
          renderVoice();
          startVoiceTimer();
        }catch(err){
          console.error(err);
          if(recordStatus) recordStatus.textContent = 'Could not start voice recording.';
        }
      };
    }

    [...document.querySelectorAll('[data-voice-remove]')].forEach(btn => btn.onclick = () => { memoAttachments = memoAttachments.filter(att => att.id !== btn.dataset.voiceRemove); renderVoice(); });
    [...document.querySelectorAll('[data-voice-rename]')].forEach(btn => btn.onclick = () => {
      const att = memoAttachments.find(a => a.id === btn.dataset.voiceRename); if(!att) return;
      const next = prompt('Rename attachment', att.name || 'voice-memo.webm');
      if(next === null) return;
      att.name = preserveName(next, att.name || 'voice-memo.webm');
      renderVoice();
    });
    [...document.querySelectorAll('[data-voice-play]')].forEach(btn => btn.onclick = () => previewVoiceMemo(btn.dataset.voicePlay));
    document.getElementById('voiceMemoSaveBtn').onclick = () => {
      if(!memoAttachments.length || isRecording) return;
      const text = (document.getElementById('voiceMemoTitle')?.value || title || '').trim() || defaultMemoTitle();
      let targetDate = '';
      let targetTime = '';
      if(status === 'today') targetDate = state.currentDate;
      else if(status === 'later'){
        if(timing === 'tomorrow') targetDate = addDays(state.currentDate, 1);
        if(timing === 'thisweek') targetDate = endOfWeek(state.currentDate);
        if(timing === 'nextweek') targetDate = addDays(endOfWeek(state.currentDate), 1);
        if(timing === 'date') targetDate = getDateControlValue('voiceMemoDateText', 'voiceMemoDateNative', chosenDate) || chosenDate;
        if(timing === 'someday') targetDate = '';
      }
      if(status !== 'inbox' && timeMode !== 'notime'){
        if(timeMode === 'time') targetTime = getTimeControlValue('voiceMemoTimeText', 'voiceMemoTimeNative', chosenTime) || chosenTime;
        else targetTime = chosenTime;
      }
      createItem(text, { kind:'note', lane, status, targetDate, targetTime, attachments:memoAttachments.slice() });
      closeSheet(true);
      showToast(status === 'today' ? 'Voice memo saved to Today' : status === 'later' ? 'Voice memo saved to Upcoming' : 'Voice memo saved to Inbox');
    };
    sheetBeforeClose = () => {
      const hasDraft = memoAttachments.length || (document.getElementById('voiceMemoTitle')?.value || title || '').trim();
      if(isRecording) return confirm('Discard the recording in progress?');
      if(hasDraft) return confirm('Discard this voice memo draft?');
      return true;
    };
    sheetCleanup = () => {
      stopVoiceTimer();
      if(recorderControl){ const control = recorderControl; recorderControl = null; isRecording = false; control.discard?.(); }
    };
  };

  renderVoice();
}

function openScheduleSheet(id){
  const item = state.items.find(x => x.id === id); if(!item) return;
  let when = item.targetDate ? 'date' : 'tomorrow';
  let chosenDate = item.targetDate || addDays(state.currentDate, 1);
  let chosenTime = item.targetTime || '';
  let timeMode = item.targetTime ? 'time' : 'notime';
  const quickOptions = [
    ['tomorrow','Tomorrow'],
    ['thisweek','This week'],
    ['nextweek','Next week'],
    ['date','Pick date'],
    ['someday','No date']
  ];
  const renderSchedule = () => {
    const previewDate = resolvePlannedDate(when, state.currentDate, chosenDate) || state.currentDate;
    const timeOptions = quickTimeOptionsForDate(previewDate);
    const showDate = when === 'date';
    const canHaveTime = when !== 'someday';
    const showTime = canHaveTime && timeMode === 'time';
    openSheet(`
      <div class="stack">
        <div><div class="h2">Set date/time</div><div class="sub">Choose when this should come back into view.</div></div>
        <div class="sub">${h(item.text)}</div>
        <label class="stack" style="gap:6px">
          <span class="label">When</span>
          <div class="seg" id="planWhenSwitch">${quickOptions.map(([key,label]) => `<button class="chip ${when===key?'active':''}" type="button" data-when="${key}">${label}</button>`).join('')}</div>
        </label>
        ${showDate ? `<div class="datepick"><input class="field" id="planDateText" type="text" inputmode="numeric" placeholder="YYYY-MM-DD" value="${h(chosenDate)}" /><button class="btn slim" type="button" id="planDateBtn" aria-label="Choose date">📅</button><input class="native-date-proxy" id="planDateNative" type="date" value="${h(chosenDate)}" tabindex="-1" aria-hidden="true" /></div>` : `<div class="helper">${when==='someday' ? 'This will stay in Upcoming without a date.' : 'You can always fine-tune the date later.'}</div>`}
        ${canHaveTime ? `<label class="stack" style="gap:6px"><span class="label">Time</span><div class="seg" id="planTimeSwitch">${timeOptions.map(([key,label]) => `<button class="chip ${timeMode===key?'active':''}" type="button" data-time-mode="${key}">${label}</button>`).join('')}</div></label>${showTime ? `<div class="timepick"><input class="field" id="planTimeText" type="text" inputmode="numeric" placeholder="HH:MM or 9am" value="${h(chosenTime)}" /><button class="btn slim" type="button" id="planTimeBtn" aria-label="Choose time">🕘</button><input class="native-time-proxy" id="planTimeNative" type="time" value="${h(chosenTime)}" tabindex="-1" aria-hidden="true" /></div>` : `<div class="helper">${timeMode==='notime' ? 'Leave it undated by time unless the hour actually matters.' : 'This will show on the item and in Upcoming.'}</div>`}` : ''}
        <div class="row"><button class="btn primary full" id="savePlanDateBtn">Save</button></div>
      </div>
    `);
    [...document.querySelectorAll('#planWhenSwitch [data-when]')].forEach(btn => btn.onclick = () => { when = btn.dataset.when; renderSchedule(); });
    [...document.querySelectorAll('#planTimeSwitch [data-time-mode]')].forEach(btn => btn.onclick = () => { const mode = btn.dataset.timeMode; timeMode = mode; if(mode === 'notime') chosenTime = ''; else if(mode !== 'time') chosenTime = quickTimeValueForMode(mode, previewDate); renderSchedule(); });
    if(showDate) bindDateControl({ textId:'planDateText', nativeId:'planDateNative', buttonId:'planDateBtn', onCommit: v => { chosenDate = v; } });
    if(showTime) bindTimeControl({ textId:'planTimeText', nativeId:'planTimeNative', buttonId:'planTimeBtn', onCommit: v => { chosenTime = v; } });
    document.getElementById('savePlanDateBtn').onclick = () => {
      let targetDate = '';
      let targetTime = '';
      if(when === 'tomorrow') targetDate = addDays(state.currentDate, 1);
      if(when === 'thisweek') targetDate = endOfWeek(state.currentDate);
      if(when === 'nextweek') targetDate = addDays(endOfWeek(state.currentDate), 1);
      if(when === 'date') targetDate = getDateControlValue('planDateText', 'planDateNative', chosenDate) || chosenDate;
      if(when === 'someday') targetDate = '';
      if(when !== 'someday' && timeMode !== 'notime') targetTime = timeMode === 'time' ? (getTimeControlValue('planTimeText', 'planTimeNative', chosenTime) || chosenTime) : chosenTime;
      updateItem(id, { status:'later', targetDate, targetTime }, { undoLabel:'Changed date/time' });
      closeSheet();
    };
  };
  renderSchedule();
}

function openCloseSheet(){
    const day = activeDay();
    openSheet(`
      <div class="stack">
        <div><div class="h2">End day</div><div class="sub">Leave tomorrow a clean starting point.</div></div>
        <div><div class="label">What landed</div><textarea id="closeWin">${h(day.closeWin)}</textarea></div>
        <div><div class="label">What still matters</div><textarea id="closeCarry">${h(day.closeCarry)}</textarea></div>
        <div><div class="label">Tomorrow seed</div><textarea id="closeSeed">${h(day.closeSeed)}</textarea></div>
        <div><div class="label">Note</div><textarea id="closeNote">${h(day.closeNote)}</textarea></div>
        <div class="row"><button class="btn primary full" id="saveCloseBtn">Save closeout</button><button class="btn full" id="cancelCloseBtn">Cancel</button></div>
      </div>
    `);
    document.getElementById('saveCloseBtn').onclick = () => closeDay({
      win: document.getElementById('closeWin').value,
      carry: document.getElementById('closeCarry').value,
      seed: document.getElementById('closeSeed').value,
      note: document.getElementById('closeNote').value
    });
    document.getElementById('cancelCloseBtn').onclick = closeSheet;
  }
  function openRoutineFromText(text){
    openSheet(`
      <div class="stack">
        <div><div class="h2">Make routine</div><div class="sub">Turn a repeated open loop into structure.</div></div>
        <input class="field" id="routineText" value="${h(text)}" />
        <div class="grid2">
          <select id="routineLane">${LANES.map(l => `<option value="${l.key}">${l.label}</option>`).join('')}</select>
          <select id="routineSeed"><option value="today">Seed into Today</option><option value="later">Seed into Upcoming</option></select>
        </div>
        <div class="timepick">
          <input class="field" id="routineTimeText" type="text" placeholder="6:15am / 18:00" />
          <button class="btn slim" id="routineTimeBtn">Time</button>
          <input class="native-time-proxy" id="routineTimeNative" type="time" />
        </div>
        <textarea id="routineNotes" rows="3" placeholder="What exactly should happen?"></textarea>
        <div class="label">Days</div>
        <div class="chips" id="routineDays">${['S','M','T','W','T','F','S'].map((label,idx)=>`<button class="chip active" data-day="${idx}">${label}</button>`).join('')}</div>
        <button class="btn primary full" id="saveRoutineBtn">Save routine</button>
      </div>
    `);
    const days = new Set([0,1,2,3,4,5,6]);
    [...document.querySelectorAll('[data-day]')].forEach(btn => btn.onclick = () => {
      const idx = Number(btn.dataset.day);
      if(days.has(idx)) days.delete(idx); else days.add(idx);
      btn.classList.toggle('active', days.has(idx));
    });
    document.getElementById('saveRoutineBtn').onclick = () => {
      state.settings.routines.unshift({ id:uid(), text:document.getElementById('routineText').value.trim(), lane:document.getElementById('routineLane').value, seed:document.getElementById('routineSeed').value, days:[...days].sort((a,b)=>a-b), active:true, time:getTimeControlValue('routineTimeText', 'routineTimeNative', ''), notes:document.getElementById('routineNotes').value.trim() });
      save(); closeSheet(); render();
    };
  }

  if($fab) $fab.onclick = openQuickSheet;
  load();
})();
</script>
